# ============================================================
# LGBM INTENSIV – LightGBM mit gründlichem Tuning
# ============================================================
# Mehr Trials, mehr CV-Splits, Final-Model-Tuning aktiviert,
# persistente Optuna-Studies, breitere Search Spaces.
# Für finale Modellauswahl vor Production.
#
#   python run_analysis.py --config configs/config_lgbm_intensiv.yml --export-bundle
# ============================================================

mlflow:
  experiment_name: rubin_lgbm_intensiv

constants:
  SEED: 42

data_files:
  x_file: data/processed/X.parquet
  t_file: data/processed/T.parquet
  y_file: data/processed/Y.parquet
  dtypes_file: data/processed/dtypes.json

data_processing:
  cross_validation_splits: 5

models:
  models_to_train:
    - SLearner
    - TLearner
    - XLearner
    - DRLearner
    - NonParamDML
    - ParamDML

base_learner:
  type: lgbm
  fixed_params: {}

# --- Nuisance-Tuning: breiter Raum, viele Trials --------------
tuning:
  enabled: true
  n_trials: 80
  cv_splits: 5
  storage_path: runs/optuna_studies/lgbm_intensiv.db
  reuse_study_if_exists: true
  optuna_seed: 42
  search_space:
    lgbm:
      n_estimators:        {type: int,   low: 200,    high: 1500}
      learning_rate:       {type: float, low: 0.005,  high: 0.2,   log: true}
      num_leaves:          {type: int,   low: 15,     high: 255}
      max_depth:           {type: int,   low: 3,      high: 12}
      min_child_samples:   {type: int,   low: 5,      high: 200}
      min_child_weight:    {type: float, low: 0.001,  high: 10.0,  log: true}
      subsample:           {type: float, low: 0.5,    high: 1.0}
      subsample_freq:      {type: int,   low: 1,      high: 7}
      colsample_bytree:    {type: float, low: 0.5,    high: 1.0}
      min_split_gain:      {type: float, low: 0.0,    high: 1.0}
      reg_alpha:           {type: float, low: 1.0e-8, high: 10.0,  log: true}
      reg_lambda:          {type: float, low: 1.0e-8, high: 10.0,  log: true}

# --- Final-Model-Tuning: engerer Raum für CATE-Regressor ------
# Das Final-Modell lernt auf Residuen (schwächeres Signal als Y/T),
# daher: weniger Bäume, niedrigere Lernrate, stärkere Regularisierung.
final_model_tuning:
  enabled: true
  n_trials: 40
  cv_splits: 5
  search_space:
    lgbm:
      n_estimators:        {type: int,   low: 100,    high: 800}
      learning_rate:       {type: float, low: 0.005,  high: 0.12,  log: true}
      num_leaves:          {type: int,   low: 7,      high: 127}
      max_depth:           {type: int,   low: 2,      high: 8}
      min_child_samples:   {type: int,   low: 20,     high: 250}
      min_child_weight:    {type: float, low: 0.01,   high: 10.0,  log: true}
      subsample:           {type: float, low: 0.5,    high: 0.9}
      colsample_bytree:    {type: float, low: 0.5,    high: 0.9}
      reg_alpha:           {type: float, low: 1.0e-6, high: 10.0,  log: true}
      reg_lambda:          {type: float, low: 1.0e-6, high: 10.0,  log: true}

  models: [NonParamDML, DRLearner]
  single_fold: true
optional_output:
  output_dir: runs/lgbm_intensiv
  save_predictions: true
  predictions_format: parquet

bundle:
  enabled: true
  base_dir: bundles
  include_challengers: true
  log_to_mlflow: true

selection:
  metric: qini
  higher_is_better: true
  refit_champion_on_full_data: true
