# ============================================================
# DML-FOKUS – Double Machine Learning + Causal Forest
# ============================================================
# Fokus auf DML-Familie mit Final-Model-Tuning und CausalForest
# mit EconML-Tune. Beide Search Spaces (Nuisance + Final)
# sind LightGBM-optimiert.
#
#   python run_analysis.py --config configs/config_dml_focus.yml --export-bundle
# ============================================================

mlflow:
  experiment_name: rubin_dml_focus

constants:
  SEED: 42

data_files:
  x_file: data/processed/X.parquet
  t_file: data/processed/T.parquet
  y_file: data/processed/Y.parquet
  dtypes_file: data/processed/dtypes.json

models:
  models_to_train:
    - NonParamDML
    - DRLearner
    - CausalForestDML

base_learner:
  type: lgbm
  fixed_params: {}

causal_forest:
  forest_fixed_params:
    n_jobs: -1
    min_samples_leaf: 10
  use_econml_tune: true
  tune_max_rows: 150000

# --- Nuisance-Tuning: Outcome + Propensity Classifier ---------
tuning:
  enabled: true
  n_trials: 50
  cv_splits: 5
  max_tuning_rows: 200000
  optuna_seed: 42
  search_space:
    lgbm:
      n_estimators:        {type: int,   low: 300,    high: 1500}
      learning_rate:       {type: float, low: 0.01,   high: 0.2,   log: true}
      num_leaves:          {type: int,   low: 15,     high: 255}
      max_depth:           {type: int,   low: 3,      high: 12}
      min_child_samples:   {type: int,   low: 5,      high: 200}
      min_child_weight:    {type: float, low: 0.001,  high: 10.0,  log: true}
      subsample:           {type: float, low: 0.5,    high: 1.0}
      subsample_freq:      {type: int,   low: 1,      high: 7}
      colsample_bytree:    {type: float, low: 0.5,    high: 1.0}
      min_split_gain:      {type: float, low: 0.0,    high: 1.0}
      reg_alpha:           {type: float, low: 1.0e-8, high: 10.0,  log: true}
      reg_lambda:          {type: float, low: 1.0e-8, high: 10.0,  log: true}

# --- Final-Model-Tuning: CATE-Regressor -----------------------
# DML-Final-Modelle lernen auf Residuen (Y_residual ~ X).
# Niedrigere Komplexität und stärkere Regularisierung verhindern
# Overfitting auf das schwächere CATE-Signal.
final_model_tuning:
  enabled: true
  n_trials: 30
  cv_splits: 5
  max_tuning_rows: 150000
  search_space:
    lgbm:
      n_estimators:        {type: int,   low: 100,    high: 600}
      learning_rate:       {type: float, low: 0.005,  high: 0.1,   log: true}
      num_leaves:          {type: int,   low: 7,      high: 63}
      max_depth:           {type: int,   low: 2,      high: 7}
      min_child_samples:   {type: int,   low: 30,     high: 300}
      min_child_weight:    {type: float, low: 0.1,    high: 10.0,  log: true}
      subsample:           {type: float, low: 0.5,    high: 0.85}
      colsample_bytree:    {type: float, low: 0.5,    high: 0.85}
      reg_alpha:           {type: float, low: 1.0e-4, high: 10.0,  log: true}
      reg_lambda:          {type: float, low: 1.0e-4, high: 10.0,  log: true}

  models: [NonParamDML]
optional_output:
  output_dir: runs/dml_focus
  save_predictions: true
  predictions_format: parquet

bundle:
  enabled: true
  base_dir: bundles
  include_challengers: true
  log_to_mlflow: true

selection:
  metric: qini
  higher_is_better: true
  refit_champion_on_full_data: true
