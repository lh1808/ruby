# ============================================================
# HOLDOUT PRODUCTION – Finale Validierung vor Production
# ============================================================
# 20% stratifizierter Holdout als letzter Qualitätscheck.
# Moderat breite Search Spaces für robustes Ergebnis.
#
#   python run_analysis.py --config configs/config_holdout_production.yml
# ============================================================

mlflow:
  experiment_name: rubin_holdout

constants:
  SEED: 42

data_files:
  x_file: data/processed/X.parquet
  t_file: data/processed/T.parquet
  y_file: data/processed/Y.parquet
  dtypes_file: data/processed/dtypes.json

data_processing:
  test_size: 0.2
  validate_on: holdout

models:
  models_to_train:
    - SLearner
    - TLearner
    - XLearner
    - DRLearner
    - CausalForestDML

base_learner:
  type: lgbm
  fixed_params: {}

causal_forest:
  forest_fixed_params:
    n_jobs: -1
  use_econml_tune: true
  tune_max_rows: 150000

tuning:
  enabled: true
  n_trials: 40
  cv_splits: 5
  optuna_seed: 42
  search_space:
    lgbm:
      n_estimators:        {type: int,   low: 200,    high: 1200}
      learning_rate:       {type: float, low: 0.01,   high: 0.2,   log: true}
      num_leaves:          {type: int,   low: 15,     high: 200}
      max_depth:           {type: int,   low: 3,      high: 10}
      min_child_samples:   {type: int,   low: 10,     high: 150}
      min_child_weight:    {type: float, low: 0.001,  high: 10.0,  log: true}
      subsample:           {type: float, low: 0.6,    high: 1.0}
      subsample_freq:      {type: int,   low: 1,      high: 7}
      colsample_bytree:    {type: float, low: 0.6,    high: 1.0}
      reg_alpha:           {type: float, low: 1.0e-8, high: 10.0,  log: true}
      reg_lambda:          {type: float, low: 1.0e-8, high: 10.0,  log: true}

optional_output:
  output_dir: runs/holdout
  save_predictions: true
  predictions_format: parquet

bundle:
  enabled: true
  base_dir: bundles/production
  include_challengers: true
  log_to_mlflow: true

selection:
  metric: qini
  higher_is_better: true
  refit_champion_on_full_data: true
